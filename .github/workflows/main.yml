name: Update data json

on:
  schedule:
    - cron: '5 * * * *'  # 每小時第 5 分鐘執行一次，整天 24 小時
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-court-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests
          fi

      - name: Fetch court data
        env:
          FIT17_ACCOUNT: ${{ secrets.FIT17_ACCOUNT }}
          FIT17_PASSWORD: ${{ secrets.FIT17_PASSWORD }}
        run: python fetch_courts.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slots.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update court data [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
